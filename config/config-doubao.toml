# Doubao (豆包) LLM configuration for OpenManus Real-time Tracking
[llm]
api_type = 'openai'                                                    # Doubao uses OpenAI-compatible API
model = ""                                     # Your Doubao endpoint ID
base_url = ""                # Doubao API base URL
api_key = ""                    # Your Doubao API key
max_tokens = 32768                                                    # Maximum number of tokens in the response
temperature = 0.0                                                     # Controls randomness
api_version = ""                                                      # Not used for Doubao

# Optional configuration for vision model (if available)
[llm.vision]
api_type = 'openai'                                                   # Doubao uses OpenAI-compatible API
model = ""                                     # Your Doubao vision endpoint (same as text for now)
base_url = "https://ark.cn-beijing.volces.com/api/v3"                # Doubao API base URL for vision model
api_key = ""                    # Your Doubao API key for vision model
max_tokens = 32768                                                    # Maximum number of tokens in the response
temperature = 0.0                                                     # Controls randomness for vision model
api_version = ""                                                      # Not used for Doubao
